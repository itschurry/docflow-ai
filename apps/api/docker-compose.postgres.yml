services:
  postgres:
    image: postgres:16
    container_name: docflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
      POSTGRES_DB: docflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docflow -d docflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - docflow_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: docflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  docflow_pgdata:
