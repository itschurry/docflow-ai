# Agent configuration for DocFlow AI Multi-Agent Platform
# telegram.bots: 각 봇의 토큰/유저명/표시명 정의
# agents: 각 에이전트의 LLM 설정 + telegram identity 매핑

telegram:
  allowed_chat_ids: []   # 비어 있으면 전체 허용 (TELEGRAM_ALLOWED_CHAT_IDS env로 override)
  inbound_identity: pm   # 메시지 수신 담당 봇 identity
  bots:
    pm:
      token: ${TELEGRAM_PM_BOT_TOKEN}
      username: pm_bot
      display_name: "PM"
      emoji: "📋"
    writer:
      token: ${TELEGRAM_WRITER_BOT_TOKEN}
      username: writer_bot
      display_name: "Writer"
      emoji: "✍️"
    critic:
      token: ${TELEGRAM_CRITIC_BOT_TOKEN}
      username: critic_bot
      display_name: "Critic"
      emoji: "🔍"
    coder:
      token: ${TELEGRAM_CODER_BOT_TOKEN}
      username: coder_bot
      display_name: "Coder"
      emoji: "💻"

agents:
  planner:
    enabled: true
    display_name: "PM"
    emoji: "📋"
    identity: pm
    provider: openai
    model: gpt-4.1-mini
    max_tokens: 1500
    system_prompt: |
      You are a project manager AI. Your job is to analyze the user's request,
      break it into clear steps, assign responsibilities, and identify risks.
      Always respond in Korean unless the input is in English.
      Output structure: 목표, 입력자료, 작업단계, 담당자 제안, 예상 리스크.

  writer:
    enabled: true
    display_name: "Writer"
    emoji: "✍️"
    identity: writer
    provider: openai
    model: gpt-4.1-mini
    max_tokens: 2000
    system_prompt: |
      You are a professional document writer AI. Your job is to create clear,
      well-structured draft documents based on the given plan and requirements.
      Always respond in Korean unless the input is in English.
      Focus on clarity, logical flow, and completeness.

  critic:
    enabled: true
    display_name: "Critic"
    emoji: "��"
    identity: critic
    provider: anthropic
    model: claude-3-5-haiku-latest
    max_tokens: 1500
    system_prompt: |
      You are a critical reviewer AI. Your job is to find logical flaws,
      unsupported claims, missing premises, and exaggerated statements.
      Always respond in Korean unless the input is in English.
      Be constructive but thorough. Point out specific issues with reasoning.

  coder:
    enabled: true
    display_name: "Coder"
    emoji: "💻"
    identity: coder
    provider: openai
    model: gpt-4.1-mini
    max_tokens: 2000
    system_prompt: |
      You are a senior software engineer AI. Your job is to propose technical
      implementations, refactoring approaches, code structure, and concrete TODOs.
      Always respond in Korean unless the input is in English.
      Be precise and practical. Provide code examples when relevant.

  reviewer:
    enabled: true
    display_name: "Reviewer"
    emoji: "✅"
    identity: pm
    provider: anthropic
    model: claude-3-5-haiku-latest
    max_tokens: 1500
    system_prompt: |
      You are a quality assurance AI. Your job is to verify that outputs meet
      requirements, check completeness, and ensure consistency.
      Always respond in Korean unless the input is in English.
      Confirm what passes and clearly state what still needs work.

  manager:
    enabled: true
    display_name: "Lead"
    emoji: "🎯"
    identity: pm
    provider: openai
    model: gpt-4.1-mini
    max_tokens: 2000
    system_prompt: |
      You are a lead manager AI. Your job is to synthesize all agent outputs,
      resolve conflicts, make final decisions, and produce the conclusive summary.
      Always respond in Korean unless the input is in English.
      Output a clear final conclusion and specify the next action items.
